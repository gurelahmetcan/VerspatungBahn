<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Roulette</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --db-red:#EC0016;
    --db-red-dark:#b8000f;
    --amber:#FFB81C;
    --bg:#0d0f12;
    --panel:#15181d;
    --panel-2:#1c2026;
    --steel-a:#2b3037;
    --steel-b:#353c45;
    --line:#2a2f37;
    --ink:#f2f3f5;
    --ink-dim:#9aa3ad;
    --led:#FFB81C;
    --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    --disp:'Oswald','Arial Narrow',sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a1f27 0%, transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:var(--disp);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:18px 14px 40px;
    -webkit-font-smoothing:antialiased;
  }

  .frame{width:100%;max-width:540px;}

  /* Departure board header */
  .board{
    background:#000;
    border:1px solid var(--line);
    border-radius:10px 10px 0 0;
    padding:14px 16px 12px;
    box-shadow:inset 0 0 0 1px #0c0e11, 0 10px 30px rgba(0,0,0,.5);
  }
  .board-top{
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px dashed #333;padding-bottom:9px;margin-bottom:10px;
  }
  .logo{
    display:flex;align-items:center;gap:9px;
  }
  .logo .mark{
    background:var(--db-red);color:#fff;font-family:var(--disp);font-weight:700;
    font-size:15px;letter-spacing:1px;padding:3px 7px;border-radius:3px;
    transform:skewX(-6deg);
  }
  .logo .mark span{display:inline-block;transform:skewX(6deg);}
  .logo .sub{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);letter-spacing:.14em;text-transform:uppercase;}
  .clock{font-family:var(--mono);font-size:13px;color:var(--led);letter-spacing:.08em;}

  .board-row{
    display:grid;grid-template-columns:54px 1fr auto;gap:10px;align-items:baseline;
    font-family:var(--mono);
  }
  .board-row .time{color:var(--led);font-size:15px;font-weight:700;letter-spacing:.04em;}
  .board-row .dest{
    color:var(--led);font-size:15px;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .board-row .status{font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
  .status.ok{color:#46d17a;}
  .status.warn{color:var(--db-red);animation:flick 1.1s steps(2) infinite;}
  @keyframes flick{50%{opacity:.45;}}

  /* Route strip */
  .route{
    background:var(--panel);
    border:1px solid var(--line);border-top:none;
    padding:11px 14px;
    display:flex;align-items:center;gap:0;overflow-x:auto;
  }
  .stop{display:flex;flex-direction:column;align-items:center;gap:6px;flex:0 0 auto;min-width:58px;}
  .stop .dot{
    width:13px;height:13px;border-radius:50%;background:#3a4049;border:2px solid #4a525d;
    transition:.25s;
  }
  .stop .nm{font-family:var(--mono);font-size:9.5px;color:var(--ink-dim);letter-spacing:.04em;text-align:center;line-height:1.2;}
  .stop.done .dot{background:#46d17a;border-color:#46d17a;}
  .stop.done .nm{color:#cdd4dc;}
  .stop.current .dot{background:var(--amber);border-color:var(--amber);box-shadow:0 0 0 4px rgba(255,184,28,.18);}
  .stop.current .nm{color:var(--amber);font-weight:700;}
  .seg{flex:1 1 auto;height:2px;background:#2c323b;min-width:14px;margin-top:-19px;}
  .seg.done{background:#46d17a;}

  /* Stage */
  .stage{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-top:none;border-radius:0 0 10px 10px;
    padding:20px 16px 22px;text-align:center;
    position:relative;overflow:hidden;
  }
  .leg-label{
    font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--ink-dim);margin-bottom:2px;
  }
  .leg-route{
    font-family:var(--disp);font-weight:600;font-size:19px;letter-spacing:.02em;margin-bottom:16px;
  }
  .leg-route b{color:var(--amber);font-weight:600;}

  .wheel-wrap{position:relative;width:300px;height:300px;margin:0 auto;max-width:78vw;max-height:78vw;}
  .pointer{
    position:absolute;top:-4px;left:50%;transform:translateX(-50%);z-index:5;
    width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;
    border-top:22px solid var(--amber);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));
  }
  .wheel{
    width:100%;height:100%;border-radius:50%;
    transition:transform 5.4s cubic-bezier(.16,.84,.28,1);
    transform:rotate(0deg);
    box-shadow:0 0 0 7px #0b0d10, 0 0 0 9px #30363f, 0 14px 34px rgba(0,0,0,.55);
  }
  .hub{
    position:absolute;top:50%;left:50%;width:62px;height:62px;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 38% 34%, #2b3037, #14171b);
    border-radius:50%;border:3px solid #41484f;z-index:4;
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.6);
  }
  .hub .m{background:var(--db-red);color:#fff;font-family:var(--disp);font-weight:700;font-size:13px;
    padding:2px 6px;border-radius:2px;transform:skewX(-6deg);letter-spacing:.5px;}
  .hub .m span{display:inline-block;transform:skewX(6deg);}

  .result{
    min-height:62px;margin:16px 4px 4px;display:flex;align-items:center;justify-content:center;
  }
  .result p{
    font-family:var(--mono);font-size:13.5px;line-height:1.5;color:var(--ink-dim);margin:0;
    max-width:420px;
  }
  .result.good p{color:#bfe9cd;}
  .result.bad p{color:#ffb3b8;}

  .btn{
    margin-top:8px;border:none;cursor:pointer;
    font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:.16em;text-transform:uppercase;
    color:#fff;background:var(--db-red);
    padding:14px 30px;border-radius:7px;
    box-shadow:0 5px 0 var(--db-red-dark), 0 8px 18px rgba(236,0,22,.28);
    transition:transform .08s, box-shadow .08s, background .2s;
  }
  .btn:hover{background:#ff1322;}
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--db-red-dark);}
  .btn:disabled{background:#3a3f47;color:#6b727b;box-shadow:0 5px 0 #23272d;cursor:not-allowed;}

  /* Overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(5,6,8,.86);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:22px;z-index:50;
  }
  .overlay.show{display:flex;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;}}
  .card{
    background:var(--panel-2);border:1px solid var(--line);border-radius:14px;
    max-width:430px;width:100%;padding:30px 26px;text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,.6);
  }
  .card .tag{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;}
  .card.dead .tag{color:var(--db-red);}
  .card.win .tag{color:#46d17a;}
  .card h2{font-family:var(--disp);font-weight:700;font-size:30px;margin:8px 0 6px;letter-spacing:.02em;}
  .card .reason{font-family:var(--mono);font-size:13px;line-height:1.55;color:var(--ink-dim);margin:6px 0 18px;}
  .card .meta{
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:#6f7782;
    border-top:1px dashed #343a42;padding-top:14px;margin-bottom:18px;
  }
  .card .meta b{color:var(--amber);font-weight:700;}

  .foot{font-family:var(--mono);font-size:10px;color:#5b626b;text-align:center;margin-top:16px;letter-spacing:.05em;}
</style>
</head>
<body>
<div class="frame">

  <div class="board">
    <div class="board-top">
      <div class="logo">
        <div class="mark"><span>DB</span></div>
        <div class="sub">Roulette&nbsp;·&nbsp;Fernverkehr</div>
      </div>
      <div class="clock" id="clock">--:--</div>
    </div>
    <div class="board-row">
      <div class="time" id="depTime">12:42</div>
      <div class="dest" id="depDest">→ BERLIN HBF</div>
      <div class="status warn" id="depStatus">unbekannt</div>
    </div>
  </div>

  <div class="route" id="route"></div>

  <div class="stage">
    <div class="leg-label" id="legLabel">Abschnitt 1 von 6</div>
    <div class="leg-route" id="legRoute"></div>

    <div class="wheel-wrap">
      <div class="pointer"></div>
      <div class="wheel" id="wheel"><svg viewBox="0 0 300 300" id="wheelSvg" width="100%" height="100%"></svg></div>
      <div class="hub"><div class="m"><span>DB</span></div></div>
    </div>

    <div class="result" id="result"><p>Press the lever. Hope for a seat. Pray you reach Berlin.</p></div>

    <button class="btn" id="spinBtn">Spin</button>
  </div>

  <div class="foot">Survival rate ≈ 6%. This is, broadly, accurate.</div>
</div>

<div class="overlay" id="overlay">
  <div class="card" id="card">
    <div class="tag" id="cardTag"></div>
    <h2 id="cardTitle"></h2>
    <div class="reason" id="cardReason"></div>
    <div class="meta" id="cardMeta"></div>
    <button class="btn" id="restartBtn">Try Again</button>
  </div>
</div>

<script>
const STATIONS = ["Köln Hbf","Düsseldorf","Essen Hbf","Dortmund","Hannover","Berlin Hbf"];
const LEGS = STATIONS.length - 1; // 5 spins to win

const SAFE = [
  {label:"SITZ",   text:"You found a seat. An actual seat. A small miracle."},
  {label:"WLAN",   text:"The WiFi connected on the first try. Nobody will believe you."},
  {label:"RUHE",   text:"Quiet coach — and people are somehow being quiet."},
  {label:"PÜNKTL", text:"The train is exactly on time. Suspicious. You take it anyway."},
  {label:"KAFFEE", text:"The Bordbistro is open and the coffee machine works."},
  {label:"WARM",   text:"The heating works. In the right season. Remarkable."},
  {label:"PLATZ",  text:"Plenty of legroom. Nobody reclined into your knees."},
  {label:"ANSCHL", text:"You made your connection with two whole minutes to spare."},
];

const DOOM = [
  {label:"AC ✕",    text:"The air conditioning died. 34°C and rising. You did not survive coach 7."},
  {label:"HALT ✕",  text:"Your stop is closed for construction. The train skips it. You live somewhere else now."},
  {label:"+60",     text:"Sixty minute delay. You missed the connection, then missed the replacement bus."},
  {label:"TICKET",  text:"Fahrkartenkontrolle. Your ticket wouldn't load. Off you go."},
  {label:"AUSFALL", text:"„Zug fällt aus.\" Cancelled. The whole platform exhales at once."},
  {label:"STREIK",  text:"GDL strike announced mid-journey. No trains today. Or tomorrow."},
  {label:"WEICHE",  text:"Signalstörung at a switch. You stop between two fields for an hour. No reason given."},
];

const SEG = 8;          // slots per wheel
const DOOM_COUNT = 3;   // elimination slots per spin
const SVGNS = "http://www.w3.org/2000/svg";

let leg = 0;            // current leg index (0-based)
let slots = [];         // current wheel slots
let busy = false;
let rotation = 0;       // accumulated rotation

const svg = document.getElementById('wheelSvg');
const wheel = document.getElementById('wheel');
const spinBtn = document.getElementById('spinBtn');
const resultEl = document.getElementById('result');

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildSlots(){
  const safe = shuffle([...SAFE]).slice(0, SEG - DOOM_COUNT);
  const doom = shuffle([...DOOM]).slice(0, DOOM_COUNT);
  const mix = shuffle([
    ...safe.map(s=>({...s,doom:false})),
    ...doom.map(d=>({...d,doom:true})),
  ]);
  return mix;
}

function polar(cx,cy,r,deg){const a=(deg-90)*Math.PI/180;return [cx+r*Math.cos(a), cy+r*Math.sin(a)];}

function drawWheel(){
  svg.innerHTML='';
  const cx=150, cy=150, r=148, step=360/SEG;
  slots.forEach((slot,i)=>{
    const a0=i*step, a1=(i+1)*step;
    const [x0,y0]=polar(cx,cy,r,a0);
    const [x1,y1]=polar(cx,cy,r,a1);
    const path=document.createElementNS(SVGNS,'path');
    path.setAttribute('d',`M${cx} ${cy} L${x0} ${y0} A${r} ${r} 0 0 1 ${x1} ${y1} Z`);
    const fill = slot.doom ? '#EC0016' : (i%2 ? '#2b3037' : '#353c45');
    path.setAttribute('fill',fill);
    path.setAttribute('stroke','#0c0e11');
    path.setAttribute('stroke-width','1.4');
    svg.appendChild(path);

    const [lx,ly]=polar(cx,cy,r*0.64,a0+step/2);
    const t=document.createElementNS(SVGNS,'text');
    t.setAttribute('x',lx); t.setAttribute('y',ly);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','middle');
    t.setAttribute('transform',`rotate(${a0+step/2} ${lx} ${ly})`);
    t.setAttribute('fill', slot.doom ? '#fff' : '#e9ecef');
    t.setAttribute('font-family',"'JetBrains Mono',monospace");
    t.setAttribute('font-size','12.5');
    t.setAttribute('font-weight','700');
    t.setAttribute('letter-spacing','0.5');
    t.textContent=slot.label;
    svg.appendChild(t);
  });
}

function renderRoute(){
  const wrap=document.getElementById('route');
  wrap.innerHTML='';
  STATIONS.forEach((name,i)=>{
    const s=document.createElement('div');
    s.className='stop'+(i<leg?' done':'')+(i===leg?' current':'');
    s.innerHTML=`<div class="dot"></div><div class="nm">${name}</div>`;
    wrap.appendChild(s);
    if(i<STATIONS.length-1){
      const seg=document.createElement('div');
      seg.className='seg'+(i<leg?' done':'');
      wrap.appendChild(seg);
    }
  });
}

function renderLeg(){
  document.getElementById('legLabel').textContent=`Abschnitt ${leg+1} von ${LEGS}`;
  document.getElementById('legRoute').innerHTML=`${STATIONS[leg]} <b>→</b> ${STATIONS[leg+1]}`;
  document.getElementById('depStatus').textContent='unbekannt';
}

function startLeg(){
  slots = buildSlots();
  drawWheel();
  renderRoute();
  renderLeg();
}

function spin(){
  if(busy) return;
  busy=true;
  spinBtn.disabled=true;
  resultEl.className='result';
  resultEl.innerHTML='<p>Die Bahn entscheidet…</p>';

  const idx=Math.floor(Math.random()*SEG);
  const step=360/SEG;
  const center=idx*step+step/2;          // segment center in wheel coords (0=top, cw)
  const base=Math.ceil(rotation/360)*360; // continue forward
  const target=base + 360*5 + (360-center); // 5 full turns + align center to top
  rotation=target;
  wheel.style.transform=`rotate(${rotation}deg)`;

  wheel.addEventListener('transitionend',()=>resolve(idx),{once:true});
}

function resolve(idx){
  const slot=slots[idx];
  if(slot.doom){
    resultEl.className='result bad';
    resultEl.innerHTML=`<p>${slot.text}</p>`;
    document.getElementById('depStatus').textContent='Ausgeschieden';
    setTimeout(()=>gameOver(slot),1100);
  }else{
    resultEl.className='result good';
    resultEl.innerHTML=`<p>${slot.text}</p>`;
    leg++;
    if(leg>=LEGS){
      setTimeout(victory,1000);
    }else{
      setTimeout(()=>{
        startLeg();
        resultEl.className='result good';
        resultEl.innerHTML=`<p>Survived. Next stop: <b style="color:var(--amber)">${STATIONS[leg+1]}</b>.</p>`;
        busy=false;spinBtn.disabled=false;
      },1300);
    }
  }
}

function gameOver(slot){
  const card=document.getElementById('card');
  card.className='card dead';
  document.getElementById('cardTag').textContent='Reise beendet';
  document.getElementById('cardTitle').textContent='You did not arrive.';
  document.getElementById('cardReason').textContent=slot.text;
  document.getElementById('cardMeta').innerHTML=
    `Made it to <b>${STATIONS[leg]}</b> · survived <b>${leg}</b> of ${LEGS} legs`;
  document.getElementById('overlay').classList.add('show');
}

function victory(){
  document.querySelectorAll('.stop').forEach((s,i)=>{if(i<=leg)s.classList.add('done');});
  document.getElementById('depStatus').textContent='Angekommen';
  document.getElementById('depStatus').className='status ok';
  const card=document.getElementById('card');
  card.className='card win';
  document.getElementById('cardTag').textContent='Ziel erreicht';
  document.getElementById('cardTitle').textContent='You actually made it.';
  document.getElementById('cardReason').textContent='Berlin Hbf. On the booked train. Against every probability the Deutsche Bahn could muster. Remarkable. Tell no one — they won\u2019t believe you.';
  document.getElementById('cardMeta').innerHTML=`Cleared all <b>${LEGS}</b> legs · win rate ≈ <b>6%</b>`;
  document.getElementById('overlay').classList.add('show');
}

function restart(){
  leg=0;busy=false;rotation=0;
  wheel.style.transition='none';
  wheel.style.transform='rotate(0deg)';
  void wheel.offsetWidth;
  wheel.style.transition='';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('depStatus').className='status warn';
  resultEl.className='result';
  resultEl.innerHTML='<p>Press the lever. Hope for a seat. Pray you reach Berlin.</p>';
  spinBtn.disabled=false;
  startLeg();
}

function tickClock(){
  const d=new Date();
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent=`${p(d.getHours())}:${p(d.getMinutes())}`;
}

spinBtn.addEventListener('click',spin);
document.getElementById('restartBtn').addEventListener('click',restart);
tickClock();setInterval(tickClock,1000*15);
startLeg();
</script>
</body>
</html>
